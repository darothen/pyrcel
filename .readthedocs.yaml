version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.11"
  commands:
    - pip install uv
    - uv pip install --system -e ".[docs]"
    # DOCS_EXECUTE is intentionally omitted: figures and console outputs are
    # pre-committed to docs/assets/ and used directly.  To regenerate them,
    # run `DOCS_EXECUTE=1 uv run mkdocs build` locally and commit the results.
    - MPLBACKEND=Agg mkdocs build --site-dir $READTHEDOCS_OUTPUT/html --no-strict
