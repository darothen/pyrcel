name: CI

on:
  push:
    branches:
      - master
      - main
      # TODO(#49): feat/** is here only to run CI on PRs targeting
      # feat/v2-implementation during the v2 development cycle. Remove
      # once feat/v2-implementation is merged to main.
      - "feat/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }} --extra test --frozen

      - name: Lint (ruff via prek)
        run: prek run --all-files

      - name: Run fast tests
        run: uv run pytest tests/ -m "not slow" -v
