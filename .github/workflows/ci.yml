name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [py311, py312, py313, py314]
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.7
        with:
          environments: ${{ matrix.environment }}

      - name: Install and test pyrcel simulation
        run: pixi run -e ${{ matrix.environment }} ci
