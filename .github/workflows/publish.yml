name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm needs full history for version

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set version from tag
        # Strip the leading 'v' from the release tag (e.g. v2.0.0 → 2.0.0) so
        # SETUPTOOLS_SCM_PRETEND_VERSION is a valid PEP 440 version string.
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build sdist and wheel
        run: uv build
        env:
          # uv's isolated build environment can't access the git directory, so
          # setuptools-scm can't derive the version from the tag on its own.
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ env.RELEASE_VERSION }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi  # requires manual approval from repo admin
    permissions:
      id-token: write  # OIDC token for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
