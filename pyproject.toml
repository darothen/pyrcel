[build-system]
requires = ["setuptools>=64", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
description = "pyrcel: 0D adiabatic cloud parcel model"
name = "pyrcel"
authors = [
    { name = "Daniel Rothenberg", email = "daniel@danielrothenberg.com" },
]
readme = "README.md"
requires-python = ">=3.9"
license = { file = "LICENSE.md" }
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Environment :: Console",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: BSD License",
    "Natural Language :: English",
    "Operating System :: Unix",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering :: Atmospheric Science",
]
dependencies = [
    "numba",
    "numpy",
    "pandas",
    "pyyaml",
    "scipy",
    "setuptools",
    "xarray",
]
dynamic = ["version"]

# v2 migration (numba/Assimulo -> JAX/diffrax) is staged via optional groups so the
# transition can proceed without disturbing the current runtime. `diffrax` transitively
# brings optimistix, equinox, lineax, and jaxtyping; equinox and optimistix are listed
# explicitly since the v2 code imports them directly. See
# docs/design/jax-diffrax-migration.md.
#
# The JAX backend requires Python >= 3.10 (jax itself dropped 3.9), while the package as a
# whole still supports 3.9 for the legacy numba backend. The `python_version` markers keep
# `uv`/pip resolution satisfiable across the full `requires-python` range: on 3.9 the `jax`
# extra resolves to nothing (use the numba backend); on 3.10+ it pulls the JAX stack.
[project.optional-dependencies]
jax = [
    "jax>=0.4.38; python_version >= '3.10'",
    "diffrax>=0.6.2; python_version >= '3.10'",
    "equinox>=0.11.10; python_version >= '3.10'",
    "optimistix>=0.0.7; python_version >= '3.10'",
]
test = [
    "pytest>=7",
    "hypothesis>=6",
]
examples = [
    "matplotlib>=3.5",
]

[project.urls]
Documentation = "https://pyrcel.readthedocs.io/en/latest/"
Repository = "https://github.com/darothen/pyrcel"

[tools.setuptools]
packages = ["pyrcel"]

[tool.setuptools.packages]
find = {namespaces = false} 

[project.scripts]
run_parcel = "pyrcel.scripts.run_parcel:run_parcel"

[tool.setuptools_scm]
version_file = "pyrcel/version.py"

[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[tool.pixi.dependencies]
numpy = "<2.2"
assimulo = "==3.6"

[tool.pixi.feature.py39.dependencies]
python = "3.9.*"

[tool.pixi.feature.py310.dependencies]
python = "3.10.*"

[tool.pixi.feature.py311.dependencies]
python = "3.11.*"

[tool.pixi.feature.py312.dependencies]
python = "3.12.*"

[tool.pixi.feature.py313.dependencies]
python = "3.13.*"

[tool.pixi.feature.py314.dependencies]
python = "3.14.*"
numpy = ">=2.1,<3"
assimulo = ">=3.7,<4"

[tool.pixi.feature.py314.pypi-dependencies]
pyrcel = { path = ".", editable = true }

[tool.pixi.feature.py314.tasks]
run_parcel = "run_parcel"
ci = "run_parcel examples/simple.yml"

[tool.pixi.environments]
default = ["py311"]
py39 = ["py39"]
py310 = ["py310"]
py311 = ["py311"]
py312 = ["py312"]
py313 = ["py313"]
py314 = { features = ["py314"], no-default-feature = true }

[tool.pixi.pypi-dependencies]
pyrcel = { path = ".", editable = true }

[tool.pixi.tasks]
run_parcel = "run_parcel"
ci = "run_parcel examples/simple.yml"