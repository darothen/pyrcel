[build-system]
requires = ["setuptools>=64", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
description = "pyrcel: 0D adiabatic cloud parcel model"
name = "pyrcel"
authors = [
    { name = "Daniel Rothenberg", email = "daniel@danielrothenberg.com" },
]
readme = "README.md"
requires-python = ">=3.9"
license = { file = "LICENSE.md" }
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Environment :: Console",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: BSD License",
    "Natural Language :: English",
    "Operating System :: Unix",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering :: Atmospheric Science",
]
dependencies = [
    "numba",
    "numpy",
    "pandas",
    "pyyaml",
    "scipy",
    "setuptools",
    "xarray",
]
dynamic = ["version"]

[project.urls]
Documentation = "https://pyrcel.readthedocs.io/en/latest/"
Repository = "https://github.com/darothen/pyrcel"

[tools.setuptools]
packages = ["pyrcel"]

[tool.setuptools.packages]
find = {namespaces = false} 

[project.scripts]
run_parcel = "pyrcel.scripts.run_parcel:run_parcel"

[tool.setuptools_scm]
version_file = "pyrcel/version.py"

[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[tool.pixi.dependencies]
numpy = "<2.2"
assimulo = "==3.6"

[tool.pixi.feature.py39.dependencies]
python = "3.9.*"

[tool.pixi.feature.py310.dependencies]
python = "3.10.*"

[tool.pixi.feature.py311.dependencies]
python = "3.11.*"

[tool.pixi.feature.py312.dependencies]
python = "3.12.*"

[tool.pixi.feature.py313.dependencies]
python = "3.13.*"

[tool.pixi.feature.py314.dependencies]
python = "3.14.*"
numpy = ">=2.1,<3"
assimulo = ">=3.7,<4"

[tool.pixi.feature.py314.pypi-dependencies]
pyrcel = { path = ".", editable = true }

[tool.pixi.feature.py314.tasks]
run_parcel = "run_parcel"
ci = "run_parcel examples/simple.yml"

[tool.pixi.environments]
default = ["py311"]
py39 = ["py39"]
py310 = ["py310"]
py311 = ["py311"]
py312 = ["py312"]
py313 = ["py313"]
py314 = { features = ["py314"], no-default-feature = true }

[tool.pixi.pypi-dependencies]
pyrcel = { path = ".", editable = true }

[tool.pixi.tasks]
run_parcel = "run_parcel"
ci = "run_parcel examples/simple.yml"