[build-system]
requires = ["setuptools>=64", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
description = "pyrcel: 0D adiabatic cloud parcel model"
name = "pyrcel"
authors = [
    { name = "Daniel Rothenberg", email = "daniel@danielrothenberg.com" },
]
readme = "README.md"
requires-python = ">=3.11"
license = { file = "LICENSE.md" }
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Environment :: Console",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: BSD License",
    "Natural Language :: English",
    "Operating System :: Unix",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering :: Atmospheric Science",
]
dependencies = [
    "numpy",
    "scipy",
    "pandas",
    "xarray",
    "pyyaml",
    "setuptools",
    "jax>=0.4.38",
    "diffrax>=0.6.2",
    "equinox>=0.11.10",
    "optimistix>=0.0.7",
]
dynamic = ["version"]

[project.optional-dependencies]
# Swap in CUDA-enabled JAX; all other v2 backend deps are already in core.
gpu = [
    "jax[cuda12]>=0.4.38",
    "diffrax>=0.6.2",
    "equinox>=0.11.10",
    "optimistix>=0.0.7",
]
test = [
    "pytest>=7",
    "hypothesis>=6",
]
examples = [
    "matplotlib>=3.5",
]

[project.urls]
Documentation = "https://pyrcel.readthedocs.io/en/latest/"
Repository = "https://github.com/darothen/pyrcel"

[tools.setuptools]
packages = ["pyrcel"]

[tool.setuptools.packages]
find = {namespaces = false}

[project.scripts]
run_parcel = "pyrcel.scripts.run_parcel:run_parcel"

[tool.setuptools_scm]
version_file = "pyrcel/version.py"

[tool.ruff]
line-length = 100
target-version = "py311"
# Notebooks in docs/ are legacy and will be rewritten in the docs overhaul (#44).
exclude = ["docs/examples/*.ipynb"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "NPY"]

[tool.ruff.lint.per-file-ignores]
# --- legacy files (moving to pyrcel.legacy in #33) ---
# Violations here will be resolved after the module rename. Any suppression
# that survives #33 must be explicitly audited and documented — tracked in #51.
"pyrcel/thermo.py" = ["F403", "F405", "UP031", "E731", "E501"]
"pyrcel/parcel.py" = ["UP031", "E731", "F841", "E501"]
"pyrcel/activation.py" = ["UP031", "E731", "F841", "E501"]
"pyrcel/_parcel_aux_numba.py" = ["UP031", "F841", "E501"]
"pyrcel/aerosol.py" = ["UP031", "E731", "F841", "E501"]
"pyrcel/distributions.py" = ["UP031", "E501"]
"pyrcel/integrator.py" = ["E731", "F841", "UP031", "UP036", "F401", "E501"]
"pyrcel/driver.py" = ["UP031", "F841", "E501"]
"pyrcel/output.py" = ["UP031", "E731", "F841", "E501"]
"pyrcel/vis.py" = ["E731", "F841", "UP031", "E501"]
"pyrcel/scripts/*.py" = ["UP031", "F841", "E501"]
"pyrcel/__init__.py" = ["F403", "F405", "F401", "E501"]
"pyrcel/test/*.py" = ["F403", "F405", "F401", "UP031", "E501"]
"pyrcel/constants.py" = ["E501"]
# --- non-package files ---
# E402: import order is intentional (sys.path setup, warnings filter before imports)
"docs/conf.py" = ["E402"]
"tools/**/*.py" = ["E402", "E501"]

[tool.pytest.ini_options]
markers = [
    "slow: full JAX/diffrax integration, autodiff, or ensemble solve (skip locally with -m 'not slow')",
]
filterwarnings = [
    "ignore:invalid value encountered in scalar divide:RuntimeWarning:pyrcel.activation",
]
